name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Compile Python
        run: uv run python -m compileall -f stream_monitor build.py

      - name: Pytest
        run: uv run pytest -q
