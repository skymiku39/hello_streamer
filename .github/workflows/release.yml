name: Build and Release Desktop Apps

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Compile Python
        run: uv run python -m compileall -f stream_monitor build.py

      - name: Pytest
        run: uv run pytest -q

      - name: Build Executable
        run: uv run python build.py

      - name: Package Windows executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item -LiteralPath dist/HelloStreamer.exe -Destination "release/HelloStreamer-${{ github.ref_name }}-windows-x64.exe"

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          path: release/*

  build-linux-x64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libgirepository1.0-dev gir1.2-ayatanaappindicator3-0.1 libnotify-bin

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Compile Python
        run: uv run python -m compileall -f stream_monitor build.py

      - name: Pytest
        run: uv run pytest -q

      - name: Build Executable
        run: uv run python build.py

      - name: Package Linux executable
        run: |
          mkdir -p release package
          cp dist/HelloStreamer package/HelloStreamer
          chmod +x package/HelloStreamer
          tar -czf "release/HelloStreamer-${{ github.ref_name }}-linux-x64.tar.gz" -C package HelloStreamer

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x64
          path: release/*

  build-linux-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build ARM64 executable
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            python:3.11-bookworm \
            bash -c '
              set -euo pipefail
              apt-get update
              apt-get install -y --no-install-recommends \
                binutils \
                gcc \
                libc-dev \
                libgirepository1.0-dev \
                gir1.2-ayatanaappindicator3-0.1 \
                gir1.2-gtk-3.0 \
                libnotify-bin \
                fonts-dejavu-core \
                file
              pip install --no-cache-dir --break-system-packages uv
              rm -rf .venv build dist
              uv venv --python python3.11
              uv sync --extra dev
              uv run python build.py
              echo "--- Build output ---"
              file dist/HelloStreamer
            '

      - name: Fix file ownership
        run: sudo chown -R "$(id -u):$(id -g)" .

      - name: Package ARM64 executable
        run: |
          mkdir -p release package
          cp dist/HelloStreamer package/HelloStreamer
          chmod +x package/HelloStreamer
          tar -czf "release/HelloStreamer-${{ github.ref_name }}-linux-arm64.tar.gz" -C package HelloStreamer

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-arm64
          path: release/*

  release:
    needs: [build-windows, build-linux-x64, build-linux-arm64]
    if: always() && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: release-*
          merge-multiple: true

      - name: List release files
        run: ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
